name: Manage Azure Resources (Create or Delete)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose 'create' or 'delete'"
        required: true
        type: choice
        options:
          - create
          - delete

permissions:
  id-token: write
  contents: read

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Execute Create/Delete Logic
      shell: bash
      run: |
        set -e

        MODE="${{ github.event.inputs.mode }}"
        RESOURCE_GROUP="FQCT-ResourceGroup"
        LOCATION="westeurope"
        KEYVAULT_NAME="fqct-kv-main"   # stable name for reuse
        SERVICE_PRINCIPAL_NAME="KeyVaultSP"

        echo "Selected mode: $MODE"

        if [ "$MODE" = "delete" ]; then
          echo "Deleting Resource Group: $RESOURCE_GROUP"
          az group delete --name $RESOURCE_GROUP --yes --no-wait || true

          echo "Checking for soft-deleted Key Vault..."
          RECOVERABLE=$(az keyvault list-deleted --query "[?name=='$KEYVAULT_NAME']" -o tsv || true)

          if [ ! -z "$RECOVERABLE" ]; then
            echo "Purging soft-deleted Key Vault..."
            az keyvault purge --name $KEYVAULT_NAME --location $LOCATION || true
          fi

          echo "Deletion workflow completed."
          exit 0
        fi

        # ---------------------------------------------------------
        # CREATE MODE
        # ---------------------------------------------------------
        echo "Running CREATE workflow..."

        # Resource Group
        RG_LOCATION=$(az group show --name $RESOURCE_GROUP --query location -o tsv || true)
        if [ -z "$RG_LOCATION" ]; then
          echo "Creating Resource Group: $RESOURCE_GROUP"
          az group create --name $RESOURCE_GROUP --location $LOCATION
        else
          echo "Resource Group already exists in: $RG_LOCATION"
          LOCATION=$RG_LOCATION
        fi

        # Service Principal
        echo "Checking for service principal: $SERVICE_PRINCIPAL_NAME..."
        SP_APPID=$(az ad sp list --display-name $SERVICE_PRINCIPAL_NAME --query "[0].appId" -o tsv || true)

        if [ -z "$SP_APPID" ]; then
          echo "Creating service principal..."
          SP_OUTPUT=$(az ad sp create-for-rbac \
            --name $SERVICE_PRINCIPAL_NAME \
            --role contributor \
            --scopes /subscriptions/$(az account show --query id -o tsv)/resourceGroups/$RESOURCE_GROUP)

          SP_APPID=$(echo "$SP_OUTPUT" | jq -r '.appId')
        fi

        SERVICE_PRINCIPAL_OBJECT_ID=$(az ad sp show --id $SP_APPID --query id -o tsv)

        echo "Using SP Object ID: $SERVICE_PRINCIPAL_OBJECT_ID"

        # Soft-deleted Key Vault
        RECOVERABLE=$(az keyvault list-deleted --query "[?name=='$KEYVAULT_NAME']" -o tsv || true)
        if [ ! -z "$RECOVERABLE" ]; then
          echo "Purging soft-deleted Key Vault..."
          az keyvault purge --name $KEYVAULT_NAME --location $LOCATION
          sleep 10
        fi

        # Create Key Vault
        echo "Creating Key Vault: $KEYVAULT_NAME"
        az keyvault create \
          --name $KEYVAULT_NAME \
          --resource-group $RESOURCE_GROUP \
          --location $LOCATION \
          --enable-rbac-authorization true

        VAULT_ID=$(az keyvault show --name $KEYVAULT_NAME --query id -o tsv)

        # RBAC Roles
        echo "Assigning RBAC roles..."

        az role assignment create \
          --role "Key Vault Secrets Officer" \
          --assignee-object-id $SERVICE_PRINCIPAL_OBJECT_ID \
          --scope $VAULT_ID

        az role assignment create \
          --role "Key Vault Crypto Officer" \
          --assignee-object-id $SERVICE_PRINCIPAL_OBJECT_ID \
          --scope $VAULT_ID

        az role assignment create \
          --role "Key Vault Certificates Officer" \
          --assignee-object-id $SERVICE_PRINCIPAL_OBJECT_ID \
          --scope $VAULT_ID

        echo "CREATE workflow completed successfully."
