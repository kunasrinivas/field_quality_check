name: Deploy Azure Infrastructure with Cleanup

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Enforce Node.js 24 runtime

jobs:
  deploy-azure-infrastructure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Create Resource Group
      run: |
        az group create --name FQCT-ResourceGroup --location swedencentral
    - name: Deploy Key Vault
      run: |
        az deployment group create \
          --resource-group FQCT-ResourceGroup \
          --template-file infra/keyvault.bicep \
          --parameters keyVaultName=FQCT-KeyVault location=swedencentral

  cleanup-on-failure:
    if: failure()

    runs-on: ubuntu-latest

    steps:
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Cleanup Resources
      run: |
        az group delete --name FQCT-ResourceGroup --yes --no-wait
          --parameters keyVaultName=FQCT-KeyVault location=swedencentral


