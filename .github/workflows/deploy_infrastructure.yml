name: Deploy Azure Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force Node.js 24 usage for GitHub Actions

jobs:
  deploy-azure-infrastructure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Resource Group
      run: |
        az deployment sub create \
          --location westeurope \
          --template-file infra/resource_group.bicep \
          --parameters resourceGroupName=FQCT-ResourceGroup location=westeurope

    - name: Deploy Key Vault
      run: |
        az deployment group create \
          --resource-group FQCT-ResourceGroup \
          --template-file infra/keyvault.bicep


