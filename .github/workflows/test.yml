name: Unit Tests

on:
  workflow_dispatch: {}   # manual trigger from GitHub Actions UI (any branch)
  push:
    branches: ["main", "dev"]
    paths:
      - "src/functions/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "src/functions/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/functions/requirements-dev.txt

      - name: Install ODBC driver
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18 --no-install-recommends

      - name: Install Python dependencies
        working-directory: src/functions
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: .
        run: pytest
