name: Unit Tests

on:
  workflow_dispatch: {}   # manual trigger from GitHub Actions UI (any branch)
  push:
    branches: ["main", "dev"]
    paths:
      - "src/functions/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "src/functions/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/functions/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: src/functions
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: .
        run: pytest
